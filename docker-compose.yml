services:
  # Caddy webserver
  caddy:
    container_name: caddy
    image: caddy:2.11.4-alpine
    restart: unless-stopped
    ports:
      - 8888:80
    volumes:
      # Caddy routes files (read-only)
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

      # Directory with site data (read-only)
      # php-fpm will perform writes when needed, Caddy does not need write access
      - ./site:/app/public:ro

      # Caddy certificates and other temporary data
      - ./caddy-data:/data

      # Caddy configuration
      - ./caddy-config:/config
    depends_on:
      - php-fpm
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:2019/metrics",
        ]
      start_period: 10s
      interval: 1m
      timeout: 5s
      retries: 5

  # Custom PHP container
  php-fpm:
    container_name: php-fpm
    user: "www-data:www-data"
    build:
      context: .
      dockerfile: ./Dockerfile
    restart: unless-stopped
    volumes:
      # Directory with site data (with write access)
      - ./site:/app/public
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-x", "php-fpm"]
      start_period: 10s
      interval: 1m
      timeout: 5s
      retries: 5

  # Redis
  redis:
    container_name: redis
    image: redis:8.2.7-alpine3.22
    restart: unless-stopped
    # Enable Append Only File so Shopware can restore queue after restart
    # `noeviction` makes Redis reject new writes if the memory is full
    command: redis-server --appendonly yes --maxmemory-policy noeviction --maxmemory 200mb
    # Limit RAM usage
    mem_limit: 256m
    volumes:
      - ./redis_data:/data
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      start_period: 3s
      interval: 1m
      timeout: 5s
      retries: 3

  # MariaDB database
  # No ports are open, only Shopware itself has access
  database:
    container_name: mariadb
    image: mariadb:11.8.8-noble
    restart: unless-stopped
    command: >
      --innodb-buffer-pool-size=1G
      --innodb-log-file-size=512M
      --max-allowed-packet=64M
      --join-buffer-size=2M
      --group-concat-max-len=320000
    cap_add:
      # Allow memory binding
      - SYS_NICE
    environment:
      # Change these if needed
      MARIADB_DATABASE: "shopware"
      MARIADB_ROOT_PASSWORD: "shopware"
    volumes:
      # Database data
      - ./mariadb_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "healthcheck.sh",
          "--su-mysql",
          "--connect",
          "--innodb_initialized",
        ]
      start_period: 10s
      interval: 1m
      timeout: 5s
      retries: 3

  # Scheduled task runner
  shopware_sched_task_runner:
    container_name: shopware_sched_task_runner
    user: "www-data:www-data"
    build:
      context: .
      dockerfile: ./Dockerfile
    command: /usr/local/bin/php /app/public/bin/console scheduled-task:run --memory-limit=512M --no-interaction --no-ansi
    restart: unless-stopped
    stop_signal: SIGKILL
    volumes:
      # Directory with site data (with write access)
      - ./site:/app/public
    depends_on:
      caddy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-x", "php"]
      start_period: 10s
      interval: 1m
      timeout: 5s
      retries: 5

  # Messenger consumer
  shopware_messenger_runner:
    container_name: shopware_messenger_runner
    user: "www-data:www-data"
    build:
      context: .
      dockerfile: ./Dockerfile
    command: /usr/local/bin/php /app/public/bin/console messenger:consume --all --memory-limit=512M --no-interaction --no-ansi
    restart: unless-stopped
    stop_signal: SIGKILL
    volumes:
      # Directory with site data (with write access)
      - ./site:/app/public
    depends_on:
      caddy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-x", "php"]
      start_period: 10s
      interval: 1m
      timeout: 5s
      retries: 5
