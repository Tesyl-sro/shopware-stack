name: Build Docker image

on:
  push:
    paths:
      - "Dockerfile"
      - "entrypoint-php.sh"
    branches:
      - main
      - feature/improvements-07-2026
  workflow_dispatch:

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: shopware-php:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
